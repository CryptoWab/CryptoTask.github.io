<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Rewards | Complete Tasks</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                              radial-gradient(circle at bottom left, #1e1b4b, transparent);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .balance-label { font-size: 0.9rem; opacity: 0.9; }
        .balance-amount { font-size: 2.2rem; font-weight: 700; margin: 5px 0; }

        /* Task List */
        .task-section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s;
        }

        .task-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .task-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .task-icon {
            background: rgba(99, 102, 241, 0.2);
            padding: 10px;
            border-radius: 12px;
            color: var(--primary);
        }

        .task-details h3 { font-size: 1rem; margin-bottom: 2px; }
        .task-details p { font-size: 0.8rem; color: #94a3b8; }

        .reward-badge {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn-claim {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            width: 100%;
        }

        /* Ad Placeholder */
        .ad-space {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            color: #64748b;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>CryptoTask Pro</h1>
            <p>Complete simple tasks to earn tokens</p>
        </div>

        <div class="balance-card">
            <div class="balance-label">Total Earnings</div>
            <div class="balance-amount">1,250 PWR</div>
            <div class="balance-label">≈ $12.50 USD</div>
        </div>

        <div class="ad-space">
            ADVERTISEMENT (Place Adsterra Code Here)
        </div>

        <div class="task-section-title">
            <i data-lucide="zap" size="18"></i> Available Tasks
        </div>

        <div class="task-card">
            <div class="task-info">
                <div class="task-icon"><i data-lucide="youtube"></i></div>
                <div class="task-details">
                    <h3>Watch Video</h3>
                    <p>Duration: 30 Seconds</p>
                </div>
            </div>
            <div class="reward-badge">+50 PWR</div>
        </div>

        <div class="task-card">
            <div class="task-info">
                <div class="task-icon"><i data-lucide="link"></i></div>
                <div class="task-details">
                    <h3>Shortlink</h3>
                    <p>Unlock the destination</p>
                </div>
            </div>
            <div class="reward-badge">+120 PWR</div>
        </div>

        <div class="task-card">
            <div class="task-info">
                <div class="task-icon"><i data-lucide="twitter"></i></div>
                <div class="task-details">
                    <h3>Follow on X</h3>
                    <p>Instant Verification</p>
                </div>
            </div>
            <div class="reward-badge">+30 PWR</div>
        </div>

        <button class="btn-claim" onclick="alert('Connect your wallet to withdraw!')">Withdraw Rewards</button>

        <div class="ad-space" style="height: 60px; margin-top: 40px;">
            Native Banner Ad
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();
    </script>
</body>
  </html>
